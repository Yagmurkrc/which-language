name: "Auto: Update Contributors"

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-contributors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine contribution type
        id: contrib
        run: |
          # Get files changed in the merged PR
          CHANGED_FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path')
          echo "Changed files: $CHANGED_FILES"

          ROLE=""
          if echo "$CHANGED_FILES" | grep -q '^problems/'; then
            ROLE="🎯 Problem Architect"
          elif echo "$CHANGED_FILES" | grep -q '^lib/codexes/'; then
            ROLE="🧠 Codex Whisperer"
          elif echo "$CHANGED_FILES" | grep -q '^artifacts/'; then
            ROLE="📊 Benchmark Runner"
          else
            ROLE="💻 Contributor"
          fi

          echo "role=$ROLE" >> $GITHUB_OUTPUT
          echo "Detected role: $ROLE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README.md Hall of Fame
        run: |
          USERNAME="${{ github.event.pull_request.user.login }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          ROLE="${{ steps.contrib.outputs.role }}"

          echo "Adding $USERNAME as $ROLE from PR #$PR_NUMBER"

          # Check if user already exists in README
          if grep -q "github.com/$USERNAME" README.md; then
            echo "User $USERNAME already in Hall of Fame, skipping."
            exit 0
          fi

          # Generate the new contributor cell
          NEW_CELL="[\<img src=\"https://github.com/$USERNAME.png?size=100\" width=\"100px;\"/\>\<br /\>\<sub\>\<b\>$USERNAME\</b\>\</sub\>](https://github.com/$USERNAME)"

          # Create a Python script to update the README
          python3 << 'PYTHON_SCRIPT'
          import re
          import sys

          username = "$USERNAME"
          role = "$ROLE"
          new_cell = f'[<img src="https://github.com/{username}.png?size=100" width="100px;"/><br /><sub><b>{username}</b></sub>](https://github.com/{username})'

          with open("README.md", "r") as f:
              content = f.read()

          # Find the Hall of Fame table section
          # Look for the table between "Hall of Fame" and "### Become a Legend"
          hall_pattern = r'(## 🏆 Hall of Fame.*?<div align="center">\s*\n)(.*?)(</div>)'
          match = re.search(hall_pattern, content, re.DOTALL)

          if not match:
              print("ERROR: Could not find Hall of Fame section in README.md")
              sys.exit(1)

          table_content = match.group(2)

          # Parse existing table rows to find where to add
          # Each row has | cell | cell | cell | format
          rows = [line for line in table_content.strip().split('\n') if line.strip().startswith('|')]

          if len(rows) >= 2:
              # Get the data row (first row with actual content)
              data_rows = [r for r in rows if '---' not in r and 'img' in r]
              separator_rows = [r for r in rows if '---' in r]
              role_rows = [r for r in rows if '---' not in r and 'img' not in r and r.strip().startswith('|')]

              if data_rows:
                  # Count cells in last data row
                  last_data_row = data_rows[-1]
                  cells = [c.strip() for c in last_data_row.split('|')[1:-1]]
                  num_cols = len(cells)

                  if num_cols < 3:
                      # Add to current row
                      # Append cell to the last data row and role row
                      new_data_row = last_data_row.rstrip(' |') + f' | {new_cell} |'
                      new_role_row = role_rows[-1].rstrip(' |') + f' | {role} |' if role_rows else f'| {role} |'
                      new_separator = separator_rows[-1].rstrip(' |') + ' | :---: |' if separator_rows else '| :---: |'

                      table_content = table_content.replace(last_data_row, new_data_row)
                      if role_rows:
                          table_content = table_content.replace(role_rows[-1], new_role_row)
                      if separator_rows:
                          table_content = table_content.replace(separator_rows[-1], new_separator)
                  else:
                      # Start new row (3 columns per row)
                      new_row = f'\n| {new_cell} |\n| :---: |\n| {role} |\n'
                      table_content = table_content.rstrip() + new_row + '\n'

          new_content = content[:match.start(2)] + table_content + content[match.end(2):]

          with open("README.md", "w") as f:
              f.write(new_content)

          print(f"Successfully added {username} to Hall of Fame as {role}")
          PYTHON_SCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: add @${{ github.event.pull_request.user.login }} to Hall of Fame (#${{ github.event.pull_request.number }})"
          git push origin main
